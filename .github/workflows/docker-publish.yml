name: Build and push Docker image

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
        with:
          install: true
          driver-opts: |
            network=host

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create buildx builder
        run: |
          docker buildx create --use --name multi-builder --driver docker-container || true
          docker buildx inspect --bootstrap

      - name: Build and push via Makefile
        env:
          DOCKER_IMAGE: ghcr.io/networkop/smart-vpn-client
        run: |
          make docker DOCKER_IMAGE=${DOCKER_IMAGE}

      - name: Image info
        run: |
          echo "Pushed images to GHCR. Inspecting manifest for GHCR..."
          docker buildx imagetools inspect ghcr.io/networkop/smart-vpn-client:latest || true
