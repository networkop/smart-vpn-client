name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.22'
      - name: Install goreleaser
        uses: goreleaser/goreleaser-action@v3
        with:
          version: latest
      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@v3
        with:
          args: release --rm-dist
